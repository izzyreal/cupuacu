version: 1
project:
  name: cupuacu

pipelines:
  - id: build
    trigger: manual
    vcs_source:
      repo: https://github.com/izzyreal/cupuacu.git
    versioning:
      file: VERSION
      tag_prefix: v
    jobs:
      - id: linux-amd64
        runs_on:
          executor: script
          shell: posix
          os: linux
          arch: amd64
        requires:
          tools:
            git: "*"
            cmake: "*"
            ccache: "*"
            xorg-dev: "*"
        timeout_seconds: 1800
        artifacts:
          - dist/**
        caches: &build_caches
          - id: fetchcontent
            env: CIWI_FETCHCONTENT_SOURCES_DIR
          - id: ccache
            env: CCACHE_DIR
        steps:
          - run: mkdir -p build/linux-amd64 dist
          - run: mkdir -p "$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: mkdir -p "$CCACHE_DIR"
          - run: if command -v ccache >/dev/null 2>&1; then ccache --zero-stats; else echo "ccache not found"; fi
          - run: CCACHE_BASEDIR="$PWD" CCACHE_NOHASHDIR=true CCACHE_COMPILERCHECK=content cmake -S . -B build/linux-amd64 -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT="$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: CCACHE_BASEDIR="$PWD" CCACHE_NOHASHDIR=true CCACHE_COMPILERCHECK=content cmake --build build/linux-amd64 --config Release --target Cupuacu cupuacu-tests
          - test:
              name: cupuacu-tests
              command: SDL_VIDEODRIVER=offscreen ./build/linux-amd64/cupuacu-tests --reporter JUnit --out build/linux-amd64/result-junit.xml
              format: junit-xml
              report: build/linux-amd64/result-junit.xml
          - run: if command -v ccache >/dev/null 2>&1; then ccache --show-stats; else echo "ccache not found"; fi
          - run: cp build/linux-amd64/Cupuacu dist/cupuacu-linux-amd64
          - run: cp build/linux-amd64/cupuacu-tests dist/cupuacu-tests-linux-amd64

      - id: linux-arm64
        runs_on:
          executor: script
          shell: posix
          os: linux
          arch: amd64
        requires:
          tools:
            git: "*"
            docker: "*"
        timeout_seconds: 7200
        artifacts:
          - dist/**
        caches: *build_caches
        steps:
          - run: mkdir -p build/linux-arm64 dist
          - run: mkdir -p "$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: mkdir -p "$CCACHE_DIR"
          - run: docker run --privileged --rm tonistiigi/binfmt --install arm64
          - run: docker buildx create --name cupuacu-linux-arm64-builder --use || docker buildx use cupuacu-linux-arm64-builder
          - run: docker buildx inspect --bootstrap
          - run: docker buildx build --platform linux/arm64 -t cupuacu-linux-arm64-cross --load -f docker/linux-arm64-cross/Dockerfile .
          - run: docker run --rm --platform linux/arm64 --user "$(id -u):$(id -g)" -v "$CCACHE_DIR:/ccache" cupuacu-linux-arm64-cross bash -lc 'export CCACHE_DIR=/ccache && ccache --zero-stats'
          - run: CONTAINER_NAME="cupuacu-linux-arm64-build-$CIWI_JOB_EXECUTION_ID" && cleanup() { docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true; docker buildx rm cupuacu-linux-arm64-builder >/dev/null 2>&1 || true; } && trap cleanup EXIT INT TERM && docker run --name "$CONTAINER_NAME" --platform linux/arm64 --user "$(id -u):$(id -g)" -v "$PWD:/work" -v "$CIWI_FETCHCONTENT_SOURCES_DIR:/ciwi-fetchcontent" -v "$CCACHE_DIR:/ccache" -w /work cupuacu-linux-arm64-cross bash -lc 'export CCACHE_DIR=/ccache && export CCACHE_COMPILERCHECK=content && cmake -S . -B build/linux-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT=/ciwi-fetchcontent && cmake --build build/linux-arm64 --config Release --target Cupuacu'
          - run: docker run --rm --platform linux/arm64 --user "$(id -u):$(id -g)" -v "$CCACHE_DIR:/ccache" cupuacu-linux-arm64-cross bash -lc 'export CCACHE_DIR=/ccache && ccache --show-stats'
          - run: docker buildx rm cupuacu-linux-arm64-builder >/dev/null 2>&1 || true
          - run: cp build/linux-arm64/Cupuacu dist/cupuacu-linux-arm64

      - id: linux-amd64-integration
        runs_on:
          executor: script
          shell: posix
          os: linux
          arch: amd64
        requires:
          tools:
            git: "*"
            docker: "*"
            ccache: "*"
        timeout_seconds: 3600
        artifacts:
          - dist/integration-junit.xml
        caches: *build_caches
        steps:
          - run: mkdir -p build/linux-amd64-integration dist
          - run: mkdir -p "$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: mkdir -p "$CCACHE_DIR"
          - run: if command -v ccache >/dev/null 2>&1; then ccache --zero-stats; else echo "ccache not found"; fi
          - run: docker build -t cupuacu-integration-linux-ci -f docker/integration/linux/Dockerfile .
          - test:
              name: cupuacu-tests-integration
              command: docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e DISPLAY=:99 -e SDL_VIDEODRIVER=x11 -e SDL_AUDIODRIVER=dummy -e SDL_RENDER_DRIVER=software -e CUPUACU_SUPPRESS_PORTAUDIO_ERRORS=1 -e CCACHE_DIR=/ccache -e CCACHE_BASEDIR=/work -e CCACHE_NOHASHDIR=true -e CCACHE_COMPILERCHECK=content -v "$PWD:/work" -v "$CIWI_FETCHCONTENT_SOURCES_DIR:/ciwi-fetchcontent" -v "$CCACHE_DIR:/ccache" -w /work cupuacu-integration-linux-ci bash -lc 'Xvfb "$DISPLAY" -screen 0 1920x1080x24 >/tmp/cupuacu-xvfb.log 2>&1 & XVFB_PID=$!; trap "kill $XVFB_PID >/dev/null 2>&1 || true" EXIT; cmake -G Ninja -S . -B build/linux-amd64-integration -DCUPUACU_BUILD_INTEGRATION_TESTS=ON -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT=/ciwi-fetchcontent && cmake --build build/linux-amd64-integration --target cupuacu-tests-integration -j2 && ./build/linux-amd64-integration/cupuacu-tests-integration --reporter JUnit --out dist/integration-junit.xml'
              format: junit-xml
              report: dist/integration-junit.xml
          - run: if command -v ccache >/dev/null 2>&1; then ccache --show-stats; else echo "ccache not found"; fi

      - id: linux-amd64-coverage
        runs_on:
          executor: script
          shell: posix
          os: linux
          arch: amd64
        requires:
          tools:
            git: "*"
            docker: "*"
        timeout_seconds: 1800
        artifacts:
          - dist/junit-unit.xml
          - dist/junit-integration.xml
          - dist/coverage.info
        caches: *build_caches
        steps:
          - run: mkdir -p build/linux-amd64-coverage dist
          - run: mkdir -p "$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: mkdir -p "$CCACHE_DIR"
          - run: docker build -t cupuacu-integration-linux-ci -f docker/integration/linux/Dockerfile .
          - run: docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e CCACHE_DIR=/ccache -e CCACHE_BASEDIR=/work -e CCACHE_NOHASHDIR=true -e CCACHE_COMPILERCHECK=content -v "$PWD:/work" -v "$CIWI_FETCHCONTENT_SOURCES_DIR:/ciwi-fetchcontent" -v "$CCACHE_DIR:/ccache" -w /work cupuacu-integration-linux-ci bash -lc 'ccache --zero-stats && cmake -G Ninja -S . -B build/linux-amd64-coverage -DCMAKE_BUILD_TYPE=Debug -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DCUPUACU_ENABLE_COVERAGE=ON -DCUPUACU_BUILD_INTEGRATION_TESTS=ON -DFETCHCONTENT_CACHE_ROOT=/ciwi-fetchcontent && cmake --build build/linux-amd64-coverage --target cupuacu-tests cupuacu-tests-integration -j2'
          - test:
              name: cupuacu-tests-coverage-unit
              command: mkdir -p dist && docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e SDL_VIDEODRIVER=offscreen -e CUPUACU_SUPPRESS_PORTAUDIO_ERRORS=1 -v "$PWD:/work" -w /work cupuacu-integration-linux-ci bash -lc './build/linux-amd64-coverage/cupuacu-tests --reporter JUnit --out dist/junit-unit.xml'
              format: junit-xml
              report: dist/junit-unit.xml
          - test:
              name: cupuacu-tests-coverage-integration
              command: mkdir -p dist && docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e DISPLAY=:99 -e SDL_VIDEODRIVER=x11 -e SDL_AUDIODRIVER=dummy -e SDL_RENDER_DRIVER=software -e CUPUACU_SUPPRESS_PORTAUDIO_ERRORS=1 -v "$PWD:/work" -w /work cupuacu-integration-linux-ci bash -lc 'Xvfb "$DISPLAY" -screen 0 1920x1080x24 >/tmp/cupuacu-coverage-xvfb.log 2>&1 & XVFB_PID=$!; trap "kill $XVFB_PID >/dev/null 2>&1 || true" EXIT; ./build/linux-amd64-coverage/cupuacu-tests-integration --reporter JUnit --out dist/junit-integration.xml && lcov --capture --rc geninfo_unexecuted_blocks=1 --ignore-errors source --directory build/linux-amd64-coverage --base-directory /work --output-file dist/coverage.raw.info && lcov --extract dist/coverage.raw.info "*/src/main/*" --output-file dist/coverage.info && perl -pe '"'"'s{^SF:.*/src/main/}{SF:src/main/}'"'"' dist/coverage.info > dist/coverage.info.tmp && mv dist/coverage.info.tmp dist/coverage.info'
              format: junit-xml
              report: dist/junit-integration.xml
              coverage_format: lcov
              coverage_report: dist/coverage.info
          - run: docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e CCACHE_DIR=/ccache -v "$CCACHE_DIR:/ccache" cupuacu-integration-linux-ci bash -lc 'ccache --show-stats'

      - id: macos-universal
        runs_on:
          executor: script
          shell: posix
          os: darwin
          arch: arm64
        requires:
          tools:
            git: "*"
            cmake: "*"
            ccache: "*"
        timeout_seconds: 1800
        artifacts:
          - dist/**
        caches: *build_caches
        steps:
          - run: mkdir -p build/macos-universal dist
          - run: mkdir -p "$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: mkdir -p "$CCACHE_DIR"
          - run: ccache --dir "$CCACHE_DIR" --zero-stats
          - run: CCACHE_BASEDIR="$PWD" CCACHE_NOHASHDIR=true CCACHE_COMPILERCHECK=content cmake -S . -B build/macos-universal -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT="$CIWI_FETCHCONTENT_SOURCES_DIR"
          - run: CCACHE_BASEDIR="$PWD" CCACHE_NOHASHDIR=true CCACHE_COMPILERCHECK=content cmake --build build/macos-universal --config Release --target Cupuacu cupuacu-tests
          - run: ccache --dir "$CCACHE_DIR" --show-stats
          - test:
              name: cupuacu-tests
              command: ./build/macos-universal/cupuacu-tests --reporter JUnit --out build/macos-universal/result-junit.xml
              format: junit-xml
              report: build/macos-universal/result-junit.xml
          - run: ditto build/macos-universal/Cupuacu.app dist/cupuacu-macos-universal.app
          - run: ditto -c -k --sequesterRsrc --keepParent dist/cupuacu-macos-universal.app dist/cupuacu-macos-universal.zip
          - run: cp build/macos-universal/cupuacu-tests dist/cupuacu-tests-macos-universal

      - id: windows-amd64
        runs_on:
          executor: script
          shell: cmd
          os: windows
          arch: amd64
        requires:
          tools:
            git: "*"
            cmake: "*"
            ccache: "*"
        timeout_seconds: 1800
        artifacts:
          - dist/**
        caches: *build_caches
        steps:
          - run: if not exist build\windows-amd64 mkdir build\windows-amd64
          - run: if not exist dist mkdir dist
          - run: if not exist "%CIWI_FETCHCONTENT_SOURCES_DIR%" mkdir "%CIWI_FETCHCONTENT_SOURCES_DIR%"
          - run: if not exist "%CCACHE_DIR%" mkdir "%CCACHE_DIR%"
          - run: '"C:\ProgramData\chocolatey\bin\ccache.exe" --dir "%CCACHE_DIR%" --zero-stats'
          - run: set "CCACHE_BASEDIR=%CD%" && set "CCACHE_NOHASHDIR=true" && set "CCACHE_COMPILERCHECK=content" && (cmake -S . -B build\windows-amd64 -G "Visual Studio 18 2026" -A x64 -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT="%CIWI_FETCHCONTENT_SOURCES_DIR%" || ((if exist build\windows-amd64 rmdir /s /q build\windows-amd64) & cmake -S . -B build\windows-amd64 -G "Visual Studio 17 2022" -A x64 -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT="%CIWI_FETCHCONTENT_SOURCES_DIR%") || ((if exist build\windows-amd64 rmdir /s /q build\windows-amd64) & cmake -S . -B build\windows-amd64 -G "Visual Studio 16 2019" -A x64 -DCUPUACU_BUILD_CCACHE_ENABLED=ON -DFETCHCONTENT_CACHE_ROOT="%CIWI_FETCHCONTENT_SOURCES_DIR%"))
          - run: set "CCACHE_BASEDIR=%CD%" && set "CCACHE_NOHASHDIR=true" && set "CCACHE_COMPILERCHECK=content" && cmake --build build\windows-amd64 --config Release --target Cupuacu cupuacu-tests
          - run: '"C:\ProgramData\chocolatey\bin\ccache.exe" --dir "%CCACHE_DIR%" --show-stats'
          - test:
              name: cupuacu-tests
              command: build\windows-amd64\Release\cupuacu-tests.exe --reporter JUnit --out build\windows-amd64\result-junit.xml
              format: junit-xml
              report: build/windows-amd64/result-junit.xml
          - run: copy /Y build\windows-amd64\Release\Cupuacu.exe dist\cupuacu-windows-amd64.exe
          - run: copy /Y build\windows-amd64\Release\cupuacu-tests.exe dist\cupuacu-tests-windows-amd64.exe

  - id: release
    trigger: manual
    depends_on:
      - build
    vcs_source:
      repo: https://github.com/izzyreal/cupuacu.git
    versioning:
      file: VERSION
      tag_prefix: v
      auto_bump: patch
      auto_bump_vcs_token: "{{ secret.github-secret }}"
      auto_bump_vault:
        connection: home-vault
        secrets:
          - name: github-secret
            mount: kv
            path: gh
            key: token
            kv_version: 2
    jobs:
      - id: github-release
        runs_on:
          executor: script
          shell: posix
          os: linux
          arch: amd64
        requires:
          tools:
            git: "*"
            gh: "*"
        timeout_seconds: 2400
        steps:
          - run: test -n "$GITHUB_TOKEN"
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"
            skip_dry_run: true
          - run: test -f VERSION
          - run: test -f dist/cupuacu-linux-amd64
          - run: test -f dist/cupuacu-linux-arm64
          - run: test -d dist/cupuacu-macos-universal.app
          - run: test -f dist/cupuacu-macos-universal.zip
          - run: test -f dist/cupuacu-windows-amd64.exe
          - run: |
              shasum -a 256 \
                dist/cupuacu-linux-amd64 \
                dist/cupuacu-linux-arm64 \
                dist/cupuacu-macos-universal.zip \
                dist/cupuacu-windows-amd64.exe \
                > dist/cupuacu-checksums.txt
          - run: |
              TAG="${CIWI_PIPELINE_TAG}"
              git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/izzyreal/cupuacu.git"
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"
            skip_dry_run: true
          - run: |
              TAG="${CIWI_PIPELINE_TAG}"
              if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                git tag -a "$TAG" -m "cupuacu $TAG"
                git push origin "$TAG"
              fi
            skip_dry_run: true
          - run: |
              TAG="${CIWI_PIPELINE_TAG}"
              if ! gh release view "$TAG" --repo izzyreal/cupuacu >/dev/null 2>&1; then
                gh release create "$TAG" \
                  --repo izzyreal/cupuacu \
                  --title "cupuacu $TAG" \
                  --notes "Release $TAG"
              fi
              gh release upload "$TAG" \
                dist/cupuacu-linux-amd64 \
                dist/cupuacu-linux-arm64 \
                dist/cupuacu-macos-universal.zip \
                dist/cupuacu-windows-amd64.exe \
                dist/cupuacu-checksums.txt \
                --repo izzyreal/cupuacu \
                --clobber
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"

pipeline_chains:
  - id: build-release
    pipelines:
      - build
      - release
